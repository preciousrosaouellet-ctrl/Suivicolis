<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portail de Suivi Livraison</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle at top,#1b1f3b,#0a0f2c,#050714);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:30px 10px 10px;
}

.plane{
    font-size:45px;
    animation: fly 2s infinite ease-in-out;
}

.package{
    font-size:38px;
    animation: bounce 1.5s infinite ease-in-out;
}

@keyframes fly{
    0%{transform:translateX(-5px) translateY(0);}
    50%{transform:translateX(5px) translateY(-10px);}
    100%{transform:translateX(-5px) translateY(0);}
}

@keyframes bounce{
    0%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
    100%{transform:translateY(0);}
}

.wrapper{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* LOGIN */
.login{
    text-align:center;
    margin-top:40px;
}

input{
    padding:14px;
    width:80%;
    margin:10px;
    border:none;
    border-radius:12px;
    font-size:14px;
    outline:none;
}

button{
    padding:12px 30px;
    background:linear-gradient(90deg,#ff6f00,#ff8f00);
    border:none;
    border-radius:12px;
    color:white;
    font-weight:600;
    cursor:pointer;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:22px;
    margin:15px 0;
    border-radius:18px;
    backdrop-filter: blur(10px);
}

.badge{
    display:inline-block;
    padding:6px 12px;
    background:rgba(255,140,0,0.2);
    border-radius:10px;
    color:#ffd59e;
    font-size:13px;
}

/* PROGRESSION */
.timeline{
    position:relative;
    margin-top:20px;
    padding-left:30px;
}

.timeline::before{
    content:"";
    position:absolute;
    left:14px;
    top:0;
    width:4px;
    height:100%;
    background:rgba(255,255,255,0.15);
    border-radius:10px;
}

.step{
    position:relative;
    margin-bottom:28px;
}

.circle{
    width:18px;
    height:18px;
    border-radius:50%;
    position:absolute;
    left:-22px;
    top:4px;
    background:gray;
}

.step.done .circle{
    background:#2ecc71;
    box-shadow:0 0 8px #2ecc71;
}

.step.current .circle{
    background:#ff9800;
    box-shadow:0 0 12px #ff9800;
}

.step.todo .circle{
    background:rgba(255,255,255,0.25);
}

.step p{
    margin:0;
    padding-left:10px;
}

.step.done p{color:#b9f6ca;}
.step.current p{color:#ffe0b2;}
.step.todo p{color:rgba(255,255,255,0.5);}

.footer{
    font-size:13px;
    opacity:0.8;
    margin-top:10px;
    text-align:center;
}

#error{
    color:#ff5252;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
    <div class="plane">✈️</div>
    <div class="package">📦</div>
    <h2>Portail de Suivi de Livraison</h2>
</div>

<div class="wrapper" id="app">

    <div class="login">
        <h3>Accès sécurisé</h3>

        <input id="client" placeholder="Numéro client"><br>
        <input type="password" id="password" placeholder="Mot de passe"><br>

        <button onclick="login()">Accéder</button>
        <p id="error"></p>
    </div>

</div>

<script>
function login(){

    let client = document.getElementById("client").value.trim();
    let password = document.getElementById("password").value.trim();
    let app = document.getElementById("app");
    let error = document.getElementById("error");

    if(client === "563208672" && password === "#0123456"){

        app.innerHTML = `

        <div class="card">
            <h3>📄 Informations administratives</h3>
            <p>Facture : <b>4-803-26494</b></p>
            <p>Déclaration : <b>678712340329</b></p>
        </div>

        <div class="card">
            <h3>📦 Informations du colis</h3>
            <p>Nom client : Barri Mamadu Saliu</p>
            <p>Téléphone : +245956223019</p>
            <p>Origine : Canada</p>
            <p>Destination : Guinée-Bissau</p>
            <p class="badge">Livraison express - 4 jours après embarquement</p>
        </div>

        <div class="card">
            <h3>📍 État de progression</h3>

            <div class="timeline">

                <div class="step done">
                    <div class="circle"></div>
                    <p>Colis enregistré</p>
                </div>

                <div class="step done">
                    <div class="circle"></div>
                    <p>Préparation logistique</p>
                </div>

                <div class="step current">
                    <div class="circle"></div>
                    <p>Embarquement</p>
                </div>

                <div class="step todo">
                    <div class="circle"></div>
                    <p>Transport aérien</p>
                </div>

                <div class="step todo">
                    <div class="circle"></div>
                    <p>Livraison finale</p>
                </div>

            </div>
        </div>

        <div class="footer">
            ⚠ Présentez votre code client et votre document à la réception du colis.
        </div>

        `;
    }
    else{
        error.innerText = "Accès refusé : identifiants incorrects";
    }
}
</script>

</body>
</html>
